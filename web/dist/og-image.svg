<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="600" y="200" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-1">
    Chinglish
  </text>
  <text x="600" y="280" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="url(#accent)" text-anchor="middle" letter-spacing="-1">
    Generator
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">
    Transform English into Chinese-style English with AI
  </text>
  
  <!-- Examples -->
  <text x="600" y="450" font-family="monospace" font-size="22" fill="#60a5fa" text-anchor="middle">
    "Please turn on the light." → "Please open the light."
  </text>
  
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="url(#accent)" opacity="0.3"/>
  <text x="600" y="608" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">
    chinglish-api.onrender.com
  </text>
</svg>
