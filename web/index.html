<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Transform English into Chinese-style English - Learn how Chinese people really think and speak!" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chinglish" />
    
    <!-- Open Graph / Social Share -->
    <meta property="og:title" content="Chinglish Generator — Transform English into Chinese-style English" />
    <meta property="og:description" content="Ever wondered why Chinese people say 'Open the light'? This AI turns English into Chinglish and shows you how Chinese logic works." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chinglish-api.onrender.com" />
    <meta property="og:image" content="https://chinglish-api.onrender.com/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chinglish Generator — Transform English into Chinese-style English" />
    <meta name="twitter:description" content="Ever wondered why Chinese people say 'Open the light'? This AI turns English into Chinglish with 5 intensity levels." />
    <meta name="twitter:image" content="https://chinglish-api.onrender.com/og-image.svg" />
    
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Chinglish Generator - Learn Chinese Thinking Patterns</title>
    
    <!-- Preconnect to API -->
    <link rel="preconnect" href="/api" />
    
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
          document.documentElement.style.backgroundColor = '#0b1220';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- PWA Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered:', registration.scope);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
